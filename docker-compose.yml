services:
  # PostgreSQL数据库服务
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=fund_user
      - POSTGRES_PASSWORD=fund_password
      - POSTGRES_DB=fund_tracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fund-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fund_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端Flask服务
  backend:
    build: ./backend
    restart: always  # 容器异常自动重启
    volumes:
      # 使用Docker命名卷持久化数据
      - app-data:/app/data
    environment:
      # PostgreSQL数据库配置
      - DB_USER=fund_user
      - DB_PASSWORD=fund_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fund_tracker
    networks:
      - fund-network
    depends_on:
      postgres:
        condition: service_healthy

  # 前端Nginx服务
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8080:80"  # 本地8080端口映射到容器80端口，本地访问http://localhost:8080即可
    depends_on:
      - backend  # 先启动后端再启动前端
    networks:
      - fund-network

  # Cloudflare Tunnel服务
  cloudflared:
    image: cloudflare/cloudflared:2024.12.1
    restart: always
    network_mode: host
    command: tunnel --protocol http2 --url http://localhost:8080 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TUNNEL_METRICS=0.0.0.0:20241
      - TUNNEL_LOGLEVEL=info

# 自定义网络，保证前后端互通
networks:
  fund-network:
    driver: bridge

# 数据卷：持久化PostgreSQL数据库和应用数据
volumes:
  postgres-data:
    driver: local
  app-data:
    driver: local
