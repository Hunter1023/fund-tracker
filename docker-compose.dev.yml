name: fund-tracker-dev

services:
  # PostgreSQL数据库服务
  postgres-dev:
    image: postgres:15-alpine
    restart: no
    environment:
      - POSTGRES_USER=fund_user
      - POSTGRES_PASSWORD=fund_password
      - POSTGRES_DB=fund_tracker_dev
    ports:
      - "5433:5432"  # 暴露PostgreSQL端口，使用5433避免冲突
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fund-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fund_user -d fund_tracker_dev"]
      interval: 1s
      timeout: 5s
      retries: 10

  # 后端Flask服务（开发模式）
  backend-dev:
    build: ./backend
    restart: no
    volumes:
      - ./data-dev:/app/data
      - ./backend:/app  # 挂载本地后端代码，支持热更新
    environment:
      - DB_USER=fund_user
      - DB_PASSWORD=fund_password
      - DB_HOST=postgres-dev
      - DB_PORT=5432
      - DB_NAME=fund_tracker_dev
      - FLASK_ENV=development  # 开发模式
      - FLASK_DEBUG=True  # 启用调试模式
    ports:
      - "5001:5000"  # 开发环境后端端口，避免与生产环境冲突
    networks:
      - fund-network-dev
    depends_on:
      postgres-dev:
        condition: service_healthy
    command: python app.py --host 0.0.0.0 --port 5000

  # 前端Vite开发服务器
  frontend-dev:
    image: node:18-alpine
    restart: no
    volumes:
      - ./frontend:/app  # 挂载整个前端目录
      - /app/node_modules  # 确保 node_modules 在容器内部，避免 Windows 挂载问题
    working_dir: /app
    environment:
      - VITE_API_BASE_URL=http://backend-dev:5000  # 后端API地址（内部网络地址）
      - CHOKIDAR_USEPOLLING=true  # 启用轮询，确保 Windows 文件变更能被检测到
    ports:
      - "3000:5173"  # 开发环境端口，避免与生产环境冲突
    depends_on:
      - backend-dev
    networks:
      - fund-network-dev
    command: sh -c "npm install --registry=https://registry.npmmirror.com && npm run dev -- --host 0.0.0.0"

# 自定义网络
networks:
  fund-network-dev:
    driver: bridge

# 数据卷
volumes:
  data-dev:
  postgres-data:
